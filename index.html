<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Free Sovereignty Council – FSC</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f0f5;
  margin: 0;
  padding: 0;
  text-align: center;
}
header {
  background: #001f3f;
  color: #fff;
  padding: 20px 0;
  font-size: 28px;
  font-weight: bold;
}
h2 { color: #003366; margin: 20px 0; }
.task-container {
  display: inline-block;
  text-align: right;
  margin: 20px auto;
  padding: 20px;
  background: #ffffff;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.task { margin: 12px 0; font-size: 18px; }
input[type=text], input[type=email] {
  padding: 10px;
  margin: 5px 0;
  width: 250px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}
button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #001f3f;
  color: #fff;
  margin-top: 15px;
}
button:disabled { background: #888; cursor: not-allowed; }
button:hover:enabled { background: #003366; }
</style>
</head>
<body>

<header>Free Sovereignty Council – FSC</header>
<h2>סיים את כל המשימות וקבל את התעודה הרשמית שלך</h2>

<div class="task-container">
  <div class="task"><input type="checkbox" id="task1"> משימה 1 – הצג את היצירה שלך</div>
  <div class="task"><input type="checkbox" id="task2"> משימה 2 – שתף את הלינק לטיקטוק או טלגרם</div>
  <div class="task"><input type="checkbox" id="task3"> משימה 3 – מלא שאלון הערכה</div>
</div>

<div style="margin-top:20px;">
  <input type="text" id="userName" placeholder="הכנס שם מלא"><br>
  <input type="email" id="userEmail" placeholder="הכנס מייל"><br>
  <button id="generateBtn" disabled>קבל תעודה מקצועית</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const tasks = ['task1','task2','task3'];
const generateBtn = document.getElementById('generateBtn');

// בדיקה שכל המשימות הושלמו
tasks.forEach(id => {
  document.getElementById(id).addEventListener('change', checkTasks);
});
function checkTasks() {
  generateBtn.disabled = !tasks.every(id => document.getElementById(id).checked);
}

// יצירת התעודה
generateBtn.addEventListener('click', async () => {
  const { jsPDF } = window.jspdf;
  const name = document.getElementById('userName').value.trim();
  const email = document.getElementById('userEmail').value.trim();
  
  if(!name || !email){ alert("הכנס שם ומייל"); return; }

  // מספר סידורי ייחודי
  let serialIndex = parseInt(localStorage.getItem('fscSerial')||'0') + 1;
  localStorage.setItem('fscSerial', serialIndex);
  const serial = `FSC-${serialIndex.toString().padStart(4,'0')}`;

  // שמירה אצל המנהל
  let allSerials = JSON.parse(localStorage.getItem('fscAllSerials')||'[]');
  allSerials.push({name, email, serial, date: new Date().toLocaleDateString()});
  localStorage.setItem('fscAllSerials', JSON.stringify(allSerials));

  const doc = new jsPDF('landscape', 'pt', 'a4');

  // רקע התעודה
  const bg = new Image();
  bg.src = 'certificate.png'; // התעודה שלך
  bg.onload = () => {
    doc.addImage(bg, 'PNG', 0, 0, 842, 595);

    // סימן מים
    doc.setTextColor(200,200,200);
    doc.setFontSize(60);
    doc.text("FSC", 250, 300, { angle: 45, opacity: 0.1 });

    // פרטי המשתמש
    doc.setTextColor(0,0,0);
    doc.setFontSize(28);
    doc.text("תעודת FSC רשמית", 220, 180);
    doc.setFontSize(20);
    doc.text(`שם: ${name}`, 220, 230);
    doc.text(`מייל: ${email}`, 220, 260);
    doc.text(`מספר סידורי: ${serial}`, 220, 290);
    const date = new Date().toLocaleDateString();
    doc.text(`תאריך: ${date}`, 220, 320);

    // חותמת / סמל
    const stamp = new Image();
    stamp.src = 'fsc_stamp.png';
    stamp.onload = () => {
      doc.addImage(stamp, 'PNG', 500, 400, 120, 120);

      // הורדה אוטומטית
      doc.save(`FSC_${serial}.pdf`);
      alert("התעודה נוצרה בהצלחה! המספר הסידורי נשמר אצל המנהל.");
    }
  }
});
</script>
</body>
</html>
